name: Deploy Vite site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build Vite site
        shell: pwsh
        run: |
          npm run build 2>&1 | Tee-Object -FilePath vite-build.log
          if ($LASTEXITCODE -ne 0) {
            $details = (Get-Content -LiteralPath vite-build.log -Tail 25) -join "%0A"
            Write-Output "::error title=Vite build failed::$details"
            exit 1
          }
        env:
          GITHUB_PAGES: "true"
          VITE_BUNNY_STREAM_LIBRARY_ID: ${{ secrets.VITE_BUNNY_STREAM_LIBRARY_ID }}
          VITE_BUNNY_STREAM_ACCESS_KEY: ${{ secrets.VITE_BUNNY_STREAM_ACCESS_KEY }}
          VITE_BUNNY_STORAGE_ACCESS_KEY: ${{ secrets.VITE_BUNNY_STORAGE_ACCESS_KEY }}
          VITE_BUNNY_STREAM_TOKEN_SECURITY_KEY: ${{ secrets.VITE_BUNNY_STREAM_TOKEN_SECURITY_KEY }}
      - name: Add SPA route fallback
        shell: pwsh
        run: Copy-Item -LiteralPath dist/index.html -Destination dist/404.html -Force
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
